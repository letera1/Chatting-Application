name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm run build

    - name: Check for security vulnerabilities
      run: |
        cd backend && npm audit --audit-level=moderate
        cd ../frontend && npm audit --audit-level=moderate

    - name: Lint backend code
      run: cd backend && npm run lint --if-present
      continue-on-error: true

    - name: Lint frontend code
      run: cd frontend && npm run lint --if-present
      continue-on-error: true

    - name: Build frontend
      run: cd frontend && npm run build

    - name: Run tests
      run: |
        cd backend && npm test --if-present
        cd ../frontend && npm test --if-present
      continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install dependencies
      run: npm run build

    - name: Check code formatting
      run: |
        cd backend && npx prettier --check "src/**/*.js" --ignore-unknown || true
        cd ../frontend && npx prettier --check "src/**/*.{js,jsx}" --ignore-unknown || true
      continue-on-error: true
